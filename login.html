<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Log In | Swagbocks</title>
</head>
<body>

    <section class="register_section">
        
        <div class="glass_form">
            <a href="index.html" style="text-decoration: none;"><h1>Swagbocks</h1></a>
            
            <form action="#" class="step1">
                <h3>Welcome Back!</h3>

                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="email@example.com" required>

                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>

                <div style="display: flex; justify-content:建设; margin-bottom: 15px;">
                    <a href="#" style="font-size: 0.8em; color: var(--color_secundario); text-decoration: none;">Forgot password?</a>
                </div>

                <div class="auth-legal-notice">
                    By clicking Log In, you agree to our 
                    <a href="terms.html">Terms of Use</a> and 
                    <a href="privacy.html">Privacy Policy</a>.
                </div>

                <button type="submit" class="nextBtn">Log In</button>

                <p style="text-align: center; margin-top: 20px; font-size: 0.9em;">
                    Don't have an account? 
                    <a href="register.html" style="color: var(--color_secundario); font-weight: bold; text-decoration: none;">Sign Up</a>
                </p>
            </form>
        </div>

    </section>

</body>
